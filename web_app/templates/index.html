<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>31位大师三阶段圆桌辩论系统</title>
<meta name="description" content="输入任意股票代码，31位投资大师分三阶段分析，产出圆桌辩论纪要和技术图表。">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f172a; --surface: #1e293b; --card: #334155;
    --text: #e2e8f0; --dim: #94a3b8; --accent: #3b82f6;
    --green: #22c55e; --red: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

.hero-section {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:4rem 2rem 2rem; text-align:center;
}
.hero-section h1 {
    font-size:2.5rem; font-weight:700;
    background:linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:0.5rem;
}
.hero-section p { color:var(--dim); font-size:1.1rem; max-width:600px; margin-bottom:2rem; }

.input-panel {
    background:var(--surface); border-radius:16px; padding:2rem;
    max-width:500px; width:100%; border:1px solid var(--card);
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.form-group { margin-bottom:1.2rem; }
.form-group label { display:block; font-size:0.85rem; color:var(--dim); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.05em; }
.form-group input, .form-group select {
    width:100%; padding:0.8rem 1rem; background:var(--card); border:1px solid #475569;
    border-radius:8px; color:var(--text); font-size:1rem; outline:none;
    transition:border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color:var(--accent); }

.btn-analyze {
    width:100%; padding:0.9rem; background:linear-gradient(135deg, var(--accent), #8b5cf6);
    border:none; border-radius:8px; color:#fff; font-size:1.05rem; font-weight:600;
    cursor:pointer; transition:transform 0.15s, opacity 0.2s;
}
.btn-analyze:hover { transform:translateY(-1px); opacity:0.95; }
.btn-analyze:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

.status {
    text-align:center; padding:1.5rem; color:var(--dim); font-size:0.95rem;
    display:none;
}
.status.show { display:block; }
.spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--dim);
    border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite;
    vertical-align:middle; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }

#report-container { padding:0 2rem 4rem; }

.footer { text-align:center; color:var(--dim); padding:2rem; font-size:0.8rem; }
</style>
</head>
<body>

<div class="hero-section">
    <h1>📊 31位大师圆桌辩论</h1>
    <p>输入任意股票代码，14位投资大师 + 12位技术大师 + 11位指标大师，三阶段分析你的股票</p>

    <div class="input-panel">
        <form id="analyzeForm">
            <div class="form-group">
                <label for="symbol">股票代码</label>
                <input type="text" id="symbol" name="symbol" placeholder="如 AAPL, 000001, 0700.HK" required>
            </div>
            <div class="form-group">
                <label for="market">市场</label>
                <select id="market" name="market">
                    <option value="US">🇺🇸 美股</option>
                    <option value="CN">🇨🇳 A股</option>
                    <option value="HK">🇭🇰 港股</option>
                </select>
            </div>
            <button type="submit" class="btn-analyze" id="btnAnalyze">🚀 开始分析</button>
        </form>
    </div>
</div>

<div class="status" id="statusArea">
    <span class="spinner"></span>
    <span id="statusText">正在拉取数据...</span>
</div>

<div id="report-container"></div>

<div class="footer">
    31位大师三阶段圆桌辩论系统 — AI 生成报告仅供参考，不构成投资建议
</div>

<script>
const form = document.getElementById('analyzeForm');
const btn = document.getElementById('btnAnalyze');
const status = document.getElementById('statusArea');
const statusText = document.getElementById('statusText');
const reportContainer = document.getElementById('report-container');

const phases = [
    '📊 正在拉取行情数据...',
    '📊 正在拉取基本面数据...',
    '⚙️ 预计算技术指标...',
    '🏛️ 阶段一：14 位投资大师分析中...',
    '📈 阶段二：12 位技术大师分析中...',
    '⚡ 阶段三：11 位指标大师信号计算中...',
    '🔗 三阶段结果整合中...',
    '📝 生成报告...',
];

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    status.classList.add('show');
    reportContainer.innerHTML = '';

    let phaseIdx = 0;
    const interval = setInterval(() => {
        if (phaseIdx < phases.length) {
            statusText.textContent = phases[phaseIdx++];
        }
    }, 5000);

    const formData = new FormData(form);
    try {
        const res = await fetch('/analyze', { method: 'POST', body: formData });
        clearInterval(interval);
        if (res.ok) {
            const html = await res.text();
            reportContainer.innerHTML = html;
            status.classList.remove('show');
        } else {
            const err = await res.json();
            statusText.textContent = `❌ 分析失败: ${err.error}`;
        }
    } catch (err) {
        clearInterval(interval);
        statusText.textContent = `❌ 网络错误: ${err.message}`;
    }
    btn.disabled = false;
});
</script>
</body>
</html>
